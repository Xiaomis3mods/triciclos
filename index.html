<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triciclos L&L - Reservas</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2; /* fondo claro */
    color:#111;
}

header{
    background:#c40000;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:24px;
}

.slogan{
    margin-top:5px;
    font-size:14px;
    opacity:0.9;
}

.card{
    background:white;
    max-width:900px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

label{
    font-weight:bold;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#900;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

h2{
    margin-top:0;
}
</style>
</head>

<body>

<header>
    <h1>🚲 Triciclos L&L</h1>
    <div class="slogan">Tu destino, nuestro compromiso</div>
</header>

<div class="card">
<h2>📅 Reservar viaje</h2>

<form onsubmit="guardar();return false;">
<input id="nombre" placeholder="Nombre completo" required>
<input id="telefono" placeholder="Teléfono">
<input id="origen" placeholder="Lugar de origen" required>
<input id="destino" placeholder="Destino" required>

<label>Fecha</label>
<input id="fecha" type="date" required>

<label>Hora</label>
<input id="hora" type="time" required>

<textarea id="detalle" placeholder="Detalles adicionales"></textarea>

<button type="submit">📲 Enviar reserva por WhatsApp</button>
</form>
</div>

<div class="card">
<h2>📋 Reservas guardadas</h2>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>Ruta</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("reservas") || "[]");

function render(){
let tb = document.getElementById("tabla");
tb.innerHTML = "";

datos.forEach((x,i)=>{
tb.innerHTML += `
<tr>
<td>${x.n}</td>
<td>${x.f}</td>
<td>${x.h}</td>
<td>${x.o} ➜ ${x.d}</td>
<td><button onclick="borrar(${i})">Eliminar</button></td>
</tr>`;
});

localStorage.setItem("reservas", JSON.stringify(datos));
}

function borrar(i){
datos.splice(i,1);
render();
}

function guardar(){

let r = {
n:nombre.value,
t:telefono.value,
o:origen.value,
d:destino.value,
f:fecha.value,
h:hora.value,
m:detalle.value
};

datos.push(r);
render();

let msg =
`🚲 Reserva Triciclos L&L
Nombre: ${r.n}
Tel: ${r.t}
Origen: ${r.o}
Destino: ${r.d}
Fecha: ${r.f}
Hora: ${r.h}
Detalles: ${r.m}`;

let url = "https://wa.me/5354632153?text=" + encodeURIComponent(msg);

window.open(url, "_blank");

document.querySelector("form").reset();
}

render();
</script>

</body>
</html>
