<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triciclos L&L - Reservas</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    color:#111;
}

/* HEADER CON IMAGEN */
header{
    position:relative;
    height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

/* IMAGEN DE FONDO */
header::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-image:url("https://raw.githubusercontent.com/Xiaomis3mods/triciclos/4dc2c8ca77aca786c4f1b0399244c3b0a28c3ebe/1b03d7c1a-32e1-471b-bf64-2aab6aa8124d.png");
    background-size:cover;
    background-position:center;
    filter:brightness(0.5);
    z-index:0;
}

/* CONTENIDO DEL HEADER */
header h1, header p{
    position:relative;
    z-index:1;
    margin:0;
}

header h1{
    font-size:28px;
}

header p{
    margin-top:8px;
    font-size:14px;
    opacity:0.95;
}

.card{
    background:white;
    max-width:900px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#900;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<header>
    <h1>🚲 Triciclos L&L</h1>
    <p>Tu destino, nuestro compromiso</p>
</header>

<div class="card">
<h2>📅 Reservar viaje</h2>

<form onsubmit="guardar();return false;">
<input id="nombre" placeholder="Nombre completo" required>
<input id="telefono" placeholder="Teléfono">
<input id="origen" placeholder="Origen" required>
<input id="destino" placeholder="Destino" required>

<label>Fecha</label>
<input id="fecha" type="date" required>

<label>Hora</label>
<input id="hora" type="time" required>

<textarea id="detalle" placeholder="Detalles adicionales"></textarea>

<button type="submit">📲 Enviar por WhatsApp</button>
</form>
</div>

<div class="card">
<h2>📋 Reservas</h2>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>Ruta</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("reservas") || "[]");

function render(){
let tb = document.getElementById("tabla");
tb.innerHTML = "";

datos.forEach((x,i)=>{
tb.innerHTML += `
<tr>
<td>${x.n}</td>
<td>${x.f}</td>
<td>${x.h}</td>
<td>${x.o} ➜ ${x.d}</td>
<td><button onclick="borrar(${i})">Eliminar</button></td>
</tr>`;
});

localStorage.setItem("reservas", JSON.stringify(datos));
}

function borrar(i){
datos.splice(i,1);
render();
}

function guardar(){

let r = {
n:nombre.value,
t:telefono.value,
o:origen.value,
d:destino.value,
f:fecha.value,
h:hora.value,
m:detalle.value
};

datos.push(r);
render();

let msg =
`🚲 Triciclos L&L%0A
Nombre: ${r.n}%0A
Tel: ${r.t}%0A
Origen: ${r.o}%0A
Destino: ${r.d}%0A
Fecha: ${r.f}%0A
Hora: ${r.h}%0A
Detalles: ${r.m}`;

window.open("https://wa.me/5354632153?text=" + msg);

document.querySelector("form").reset();
}

render();
</script>

</body>
</html>
