<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e88e5">
<meta name="description" content="Triciclos L&L - Transporte seguro en La Habana">

<title>Triciclos L&L</title>

<!-- PWA MANIFEST REAL -->
<link rel="manifest" href="data:application/manifest+json,{
\"name\":\"Triciclos L&L\",
\"short_name\":\"Triciclos L&L\",
\"start_url\":\".\",
\"display\":\"standalone\",
\"background_color\":\"#ffffff\",
\"theme_color\":\"#1e88e5\",
\"icons\":[
{\"src\":\"https://cdn-icons-png.flaticon.com/512/1995/1995485.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"},
{\"src\":\"https://cdn-icons-png.flaticon.com/512/1995/1995485.png\",\"sizes\":\"512x512\",\"type\":\"image/png\"}
]}">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

header{
background:linear-gradient(135deg,#1e88e5,#42a5f5);
color:white;
padding:30px;
text-align:center;
}

.container{padding:15px;max-width:1000px;margin:auto}

.card{
background:white;
padding:15px;
border-radius:12px;
margin:15px 0;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input,textarea,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1e88e5;
color:white;
border:none;
cursor:pointer;
}

.fab{
position:fixed;
right:20px;
bottom:20px;
background:#25d366;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<header>
<h1>Triciclos L&L</h1>
<p><b>Tu destino, nuestro compromiso.</b></p>
<p>Rapidez • Seguridad • Confort • Profesionalidad</p>
</header>

<div class="container">

<div class="card">
<h2>Reservar viaje</h2>
<input id="nombre" placeholder="Nombre">
<input id="tel" placeholder="Teléfono">
<input id="origen" placeholder="Recogida">
<input id="destino" placeholder="Destino">
<input type="date" id="fecha">
<input type="time" id="hora">
<button onclick="guardar()">Guardar reserva</button>
</div>

<div class="card">
<h2>Reservas</h2>
<div id="lista"></div>
<button onclick="exportar()">Exportar CSV</button>
</div>

</div>

<a class="fab" href="tel:+5354632153">📞 Llamar</a>

<script>

/* =========================
   SERVICE WORKER REAL PWA
========================= */

const swCode = `
const CACHE_NAME = "triciclos-ll-cache-v1";
const urlsToCache = ["./"];

self.addEventListener("install", e=>{
self.skipWaiting();
});

self.addEventListener("fetch", e=>{
e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
`;

const swBlob = new Blob([swCode], {type:"text/javascript"});
const swURL = URL.createObjectURL(swBlob);

if('serviceWorker' in navigator){
navigator.serviceWorker.register(swURL);
}

/* =========================
   RESERVAS LOCAL STORAGE
========================= */

function getData(){
return JSON.parse(localStorage.getItem("reservas") || "[]");
}

function save(){
let data = getData();

data.push({
nombre:nombre.value,
tel:tel.value,
origen:origen.value,
destino:destino.value,
fecha:fecha.value,
hora:hora.value
});

localStorage.setItem("reservas", JSON.stringify(data));

document.querySelectorAll("input").forEach(i=>i.value="");

render();
}

function render(){
let data = getData();
let html = "";

data.forEach((r,i)=>{
html += `
<div class="card">
<b>${r.nombre}</b><br>
${r.origen} ➜ ${r.destino}<br>
📅 ${r.fecha} ⏰ ${r.hora}<br>
📞 ${r.tel}
</div>`;
});

document.getElementById("lista").innerHTML = html;
}

function exportar(){
let data = getData();
let csv = "Nombre,Telefono,Origen,Destino,Fecha,Hora\n";

data.forEach(x=>{
csv += `${x.nombre},${x.tel},${x.origen},${x.destino},${x.fecha},${x.hora}\n`;
});

let a = document.createElement("a");
a.href = URL.createObjectURL(new Blob([csv]));
a.download = "reservas.csv";
a.click();
}

function guardar(){ save(); }

render();

</script>

</body>
</html>
