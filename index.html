<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triciclos L&L - Reservas</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
    color:#111;
}

header{
    background:#c00;
    color:#fff;
    padding:20px;
    text-align:center;
}

h1{margin:0}

.card{
    background:#fff;
    max-width:900px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    color:#000;
    background:#fff;
}

label{font-weight:bold}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#c00;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#900;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td,th{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<h1>🚲 Triciclos L&L</h1>
<p>Rapidez, seguridad, confort y profesionalidad</p>
</header>

<div class="card">
<h2>📅 Reserva tu viaje</h2>

<form onsubmit="guardar();return false;">

<input id="nombre" placeholder="Nombre completo" required>
<input id="telefono" placeholder="Teléfono">

<input id="origen" placeholder="Lugar de origen" required>
<input id="destino" placeholder="Destino" required>

<label>Fecha</label>
<input id="fecha" type="date" required>

<label>Hora</label>
<input id="hora" type="time" required>

<textarea id="detalle" placeholder="Detalles adicionales"></textarea>

<button type="submit">📲 Reservar y enviar a WhatsApp</button>
</form>
</div>

<div class="card">
<h2>📋 Reservas guardadas</h2>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>Ruta</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("reservas") || "[]");

function render(){
let tb = document.getElementById("tabla");
tb.innerHTML = "";

datos.forEach((x,i)=>{
tb.innerHTML += `
<tr>
<td>${x.n}</td>
<td>${x.f}</td>
<td>${x.h}</td>
<td>${x.o} ➜ ${x.d}</td>
<td><button onclick="borrar(${i})">Eliminar</button></td>
</tr>`;
});

localStorage.setItem("reservas", JSON.stringify(datos));
}

function borrar(i){
datos.splice(i,1);
render();
}

function guardar(){

let r = {
n:nombre.value,
t:telefono.value,
o:origen.value,
d:destino.value,
f:fecha.value,
h:hora.value,
m:detalle.value
};

datos.push(r);
render();

let txt =
`Hola, quiero reservar un triciclo:
Nombre: ${r.n}
Teléfono: ${r.t}
Origen: ${r.o}
Destino: ${r.d}
Fecha: ${r.f}
Hora: ${r.h}
Detalles: ${r.m}`;

let url = "https://wa.me/5354632153?text=" + encodeURIComponent(txt);

window.open(url, "_blank");

document.querySelector("form").reset();
}

render();
</script>

</body>
</html>
